<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<canvas id="canvas" width="1024" height="1024" style="width: 1024px; height: 1024px"></canvas>
<script>
    class VoidAndClusterGenerator {
        constructor (size, sigma = 1.5, smoothPhaseLength = 128) {
            this.size = size;
            this.staticSigma = sigma;
            this.smoothPhaseLength = smoothPhaseLength;
            this.valueMap  = Array.from ({length: size}, () => Array (size).fill (0));
            this.energyMap = Array.from ({length: size}, () => Array (size).fill (0));
            this.rankMap   = Array.from ({length: size}, () => Array (size).fill (-1));
            this.randomMap = Array.from ({length: size}, () => Array.from ({length: size}, () => Math.random () * 1e-6));
        }

        generate () {
            this.genWhiteNoise ();
            this.optimize ();
            this.sparsePhase (false);
            this.restoreInverted ();
            this.sparsePhase (true);
            this.normalize ();
        }

        restoreInverted () {
            const size = this.size;
            for (let x = 0; x < size; x++)
            for (let y = 0; y < size; y++) this.valueMap [x] [y] = this.rankMap [x] [y] === -1 ? 1 : 0;
            // то есть у нас теперь единицы стоят там где порядок еще не присвоен
            this.updateAllEnergy (this.staticSigma);
        }

        // при слишком большой длине массива алгоритм предпочтет обойти карту
        // мы никогда не передаем массив с дырками, потому что оно посчитает их как заполнения и нарушит порядок
        // это одна из причин зачем я восстанавливаю инвертированный массив
        updateEnergy (x, y, sigma, points = null) {
            const size = this.size;
            let e = 0;
            const r = Math.ceil (sigma * 3);

            if (points && 20*points.length < 3*r*r + 1000) {
                // обход входного массива
                for (const {x: px, y: py} of points) {
                    let dx = px - x, dy = py - y;
                    if (dx >  size / 2) dx -= size;
                    if (dx < -size / 2) dx += size;
                    if (dy >  size / 2) dy -= size;
                    if (dy < -size / 2) dy += size;
                    const d2 = dx * dx + dy * dy;
                    e += Math.exp (-d2 / (2 * sigma * sigma));
                }
            }
            else {
                // обход окрестности
                for (let dx = -r; dx <= r; dx++)
                for (let dy = -r; dy <= r; dy++) {
                    const nx = (x + dx + size) % size;
                    const ny = (y + dy + size) % size;
                    if (!this.valueMap [nx] [ny]) continue;
                    const d2 = dx * dx + dy * dy;
                    e += Math.exp (-d2 / (2 * sigma * sigma));
                }
            }
            return e;
        }

        // полный пересчёт энергии для всех точек карты или входного массива
        updateAllEnergy (sigma, points = null) {
            const size = this.size;
            if (points) {
                for (const {x, y} of points) {
                    this.energyMap [x] [y] = this.updateEnergy (x, y, sigma, points) + this.randomMap [x] [y];
                }
            }
            else {
                for (let x = 0; x < size; x++)
                for (let y = 0; y < size; y++) {
                    this.energyMap [x] [y] = this.updateEnergy (x, y, sigma) + this.randomMap [x] [y];
                }
            }
        }

        // при слишком большой длине массива обходит пространство как обычно
        flip (x, y, sigma, points = null) {
            const size = this.size;
            const delta = this.valueMap [x] [y] ? -1 : 1;
            this.valueMap [x] [y] = this.valueMap [x] [y] ? 0 : 1;
            const r = Math.ceil (sigma * 3);

            if (points && 20*points.length < 3*r*r + 1000) {
                for (const {x: px, y: py} of points) {
                    let dx = px - x, dy = py - y;
                    if (dx >  size / 2) dx -= size;
                    if (dx < -size / 2) dx += size;
                    if (dy >  size / 2) dy -= size;
                    if (dy < -size / 2) dy += size;
                    const d2 = dx * dx + dy * dy;
                    this.energyMap [px] [py] += delta * Math.exp (-d2 / (2 * sigma * sigma));
                }
            }
            else {
                for (let dx = -r; dx <= r; dx++)
                for (let dy = -r; dy <= r; dy++) {
                    const nx = (x + dx + size) % size;
                    const ny = (y + dy + size) % size;
                    if (points && !this.valueMap [nx] [ny]) continue; // наличие массива это значит пустоту не трогать
                    const d2 = dx * dx + dy * dy;
                    this.energyMap [nx] [ny] += delta * Math.exp (-d2 / (2 * sigma * sigma));
                }
            }
        }

        genWhiteNoise () {
            const size = this.size;
            let total = size * size, need = total >> 1; // целое число, для нечетных размеров
            for (let x = 0; x < size; x++)
            for (let y = 0; y < size; y++) {
                if (Math.random () * total < need) {
                    this.valueMap [x] [y] = 1;
                    need--;
                }
                total--;
            }
            this.updateAllEnergy (this.staticSigma);
        }

        findPair () {
            const size = this.size;
            let vx, vy, ve = Infinity, cx, cy, ce = -Infinity;
            for (let x = 0; x < size; x++)
            for (let y = 0; y < size; y++) {
                const e = this.energyMap [x] [y];
                if (this.valueMap [x] [y]) { if (e > ce) [cx, cy, ce] = [x, y, e]; }
                else                       { if (e < ve) [vx, vy, ve] = [x, y, e]; }
            }
            return {vx, vy, ve, cx, cy, ce};
        }

        optimize () {
            // провел много тестов, за 7.7% ни разу не вышло, кроме того это не очень критично
            // при лимите в 2 раза меньше необходимого иногда заметно что шум белее чем должен быть
            for (let i = 0, limit = 0.08 * this.size * this.size, last = null; i < limit; i++) {
                const m = this.findPair ();
                if (m.ve >= m.ce) return;
                if (last && m.vx === last.cx && m.vy === last.cy && m.cx === last.vx && m.cy === last.vy) return;
                this.flip (m.vx, m.vy, this.staticSigma);
                this.flip (m.cx, m.cy, this.staticSigma);
                last = m;
            }
            console.warn (`limit reached`);
        }

        // функция всегда только удаляет максимумы
        // для фазы заполнения массив восстанавливается инвертированным
        // параметр fill (фаза заполнения или нет) влияет только на упорядочивание
        sparsePhase (fill) {
            let size = this.size;
            let total = size * size;

            let points = [];
            for (let x = 0; x < size; x++)
            for (let y = 0; y < size; y++) if (this.valueMap [x] [y]) points.push ({x, y});
            let sigma = this.staticSigma;
            let updateAt = total / 4;

            while (points.length > this.smoothPhaseLength) {
                const {x, y, _, i} = this.findCluster (points);
                this.rankMap [x] [y] = fill ? total - points.length : points.length - 1;
                points [i] = points.at (-1);
                points.pop ();

                if (points.length <= updateAt) {
                    sigma = this.staticSigma * Math.sqrt (0.5 * size * size / points.length);
                    updateAt = Math.max (updateAt / 2, this.smoothPhaseLength);
                    this.updateAllEnergy (sigma, points);
                }
                else {
                    this.flip (x, y, sigma, points);
                }
            }
            while (points.length) {
                const {x, y, _, i} = this.findCluster (points);
                this.rankMap [x] [y] = fill ? total - points.length : points.length - 1;
                points [i] = points.at (-1);
                points.pop ();

                sigma = this.staticSigma * Math.sqrt (0.5 * size * size / points.length);
                this.updateAllEnergy (sigma, points);
            }
        }

        // поиск максимума в массиве точек
        findCluster (points) {
            let bx, by, be = -Infinity, bi = -1;
            for (let i = 0; i < points.length; i++) {
                const {x, y} = points [i];
                const e = this.energyMap [x] [y];
                if (e > be) [bx, by, be, bi] = [x, y, e, i];
            }
            return {x: bx, y: by, e: be, i: bi};
        }

        normalize () {
            const size = this.size;
            const total = size * size;
            for (let x = 0; x < size; x++)
            for (let y = 0; y < size; y++) this.valueMap [x] [y] = this.rankMap [x] [y] / total;
        }
    }

    let size = 160;
    const gen = new VoidAndClusterGenerator (size, 1.5, 128);
    gen.generate ();
    const ctx = document.getElementById ('canvas').getContext('2d');
    for (let x = 0; x < size; x++)
    for (let y = 0; y < size; y++) {
        if (gen.rankMap [x] [y] < 0) {
            ctx.fillStyle = 'magenta';
        }
        else {
            // const gray = Math.floor (gen.valueMap [x] [y] * 256);
            // ctx.fillStyle = `rgb(${gray}, ${gray}, ${gray})`;

            // const threshold = 0.001;
            // ctx.fillStyle = threshold < gen.valueMap [x] [y] ? 'skyblue' : 'blue';

            const gradient = y / size;
            ctx.fillStyle = gradient < gen.valueMap [x] [y] ? 'skyblue' : 'blue';

            // ctx.fillStyle = 'black';
        }
        ctx.fillRect (x * 3, y * 3, 3, 3);
    }
</script>
</body>
</html>
