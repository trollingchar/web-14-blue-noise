<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    class VoidAndClusterDebugger {
        constructor(size = 8) {
            this.size = size;
            this.binaryMap = [];
            this.rankMap = [];
            this.energyMap = [];
            this.initialPoints = [];
            this.currentStep = 0;
            this.maxStep = 0;
            this.snapshots = [];
            this.phase = 'init';

            this.cellSize = 10;
            this.sigma = 1.5;

            this.moveHistory = [];
            this.maxHistorySize = 3;
            this.blockedMoves = new Set();

            this.initMaps();
            this.setupCanvas();
            this.setupControls();
        }

        initMaps() {
            const size = this.size;

            for (let y = 0; y < size; y++) {
                this.binaryMap[y] = [];
                this.rankMap[y] = [];
                this.energyMap[y] = [];
                for (let x = 0; x < size; x++) {
                    this.binaryMap[y][x] = false;
                    this.rankMap[y][x] = -1;
                    this.energyMap[y][x] = 0;
                }
            }
        }

        setupCanvas() {
            this.container = document.createElement('div');
            this.container.style.cssText = `
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 20px;
            border-radius: 10px;
            font-family: monospace;
            z-index: 1000;
            max-height: 95vh;
            overflow-y: auto;
        `;
            document.body.appendChild(this.container);

            this.title = document.createElement('h3');
            this.title.textContent = 'Void-and-Cluster Debugger';
            this.title.style.marginTop = '0';
            this.container.appendChild(this.title);

            const settings = document.createElement('div');
            settings.innerHTML = `
            <div style="margin-bottom: 10px;">
                <label>Sigma: <input type="range" id="sigmaSlider" min="0.5" max="4" step="0.1" value="1.5" style="width: 100px;"></label>
                <span id="sigmaValue">1.5</span>
            </div>
        `;
            this.container.appendChild(settings);

            document.getElementById('sigmaSlider').addEventListener('input', (e) => {
                this.sigma = parseFloat(e.target.value);
                document.getElementById('sigmaValue').textContent = this.sigma.toFixed(1);
                this.restart();
            });

            this.infoPanel = document.createElement('div');
            this.infoPanel.style.cssText = 'margin-bottom: 15px; padding: 10px; background: #222; border-radius: 5px;';
            this.container.appendChild(this.infoPanel);

            this.canvasGrid = document.createElement('div');
            this.canvasGrid.style.cssText = 'display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px;';
            this.container.appendChild(this.canvasGrid);

            this.canvases = {
                binary: this.createCanvasCell('Binary Map', 'Распределение точек'),
                rank: this.createCanvasCell('Rank Map', 'Порядок (0=первый, 63=последний)'),
                energy: this.createCanvasCell('Energy Map', 'Энергия'),
                void: this.createCanvasCell('Current Void', 'Лучшая пустота'),
                cluster: this.createCanvasCell('Current Cluster', 'Худший кластер'),
                histogram: this.createCanvasCell('Histogram', 'Распределение')
            };

            const instructions = document.createElement('div');
            instructions.innerHTML = `
            <div style="margin-top: 15px; padding: 10px; background: #333; border-radius: 5px;">
                <strong>Управление:</strong><br>
                🖱️ <strong>Колесико</strong> - шаг вперед/назад<br>
                ⏯️ <strong>Пробел</strong> - старт/пауза<br>
                🔄 <strong>R</strong> - рестарт
            </div>
        `;
            this.container.appendChild(instructions);

            this.updateInfo();
        }

        createCanvasCell(title, description) {
            const cell = document.createElement('div');
            cell.style.cssText = 'background: #1a1a1a; padding: 10px; border-radius: 5px;';

            const label = document.createElement('div');
            label.style.cssText = 'font-size: 12px; margin-bottom: 5px; color: #aaa;';
            label.innerHTML = `<strong>${title}</strong><br><small>${description}</small>`;
            cell.appendChild(label);

            const canvas = document.createElement('canvas');
            const size = this.size;
            canvas.width = size * this.cellSize;
            canvas.height = size * this.cellSize;
            canvas.style.cssText = 'border: 1px solid #444; image-rendering: pixelated;';
            cell.appendChild(canvas);

            this.canvasGrid.appendChild(cell);
            return canvas;
        }

        setupControls() {
            window.addEventListener('wheel', (e) => {
                e.preventDefault();
                if (e.deltaY < 0) {
                    this.stepBackward();
                } else {
                    this.stepForward();
                }
            }, { passive: false });

            window.addEventListener('keydown', (e) => {
                switch(e.code) {
                    case 'Space':
                        e.preventDefault();
                        this.toggleAutoPlay();
                        break;
                    case 'KeyR':
                        this.restart();
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        for (let i = 0; i < 10; i++) this.stepForward();
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        for (let i = 0; i < 10; i++) this.stepBackward();
                        break;
                }
            });

            this.autoPlay = false;
            this.autoPlayInterval = null;
        }

        toggleAutoPlay() {
            this.autoPlay = !this.autoPlay;
            if (this.autoPlay) {
                this.autoPlayInterval = setInterval(() => {
                    if (!this.stepForward()) {
                        this.toggleAutoPlay();
                    }
                }, 200);
            } else {
                clearInterval(this.autoPlayInterval);
            }
        }

        calculateEnergy(x, y, binaryMap) {
            const size = this.size;
            let energy = 0;
            const sigma = this.sigma;
            const radius = Math.ceil(sigma * 3);

            for (let dy = -radius; dy <= radius; dy++) {
                for (let dx = -radius; dx <= radius; dx++) {
                    const nx = (x + dx + size) % size;
                    const ny = (y + dy + size) % size;

                    if (binaryMap[ny][nx]) {
                        const distSq = dx * dx + dy * dy;
                        energy += Math.exp(-distSq / (2 * sigma * sigma));
                    }
                }
            }

            return energy;
        }

        updateEnergyMap() {
            for (let y = 0; y < this.size; y++) {
                for (let x = 0; x < this.size; x++) {
                    this.energyMap[y][x] = this.calculateEnergy(x, y, this.binaryMap);
                }
            }
        }

        findVoid() {
            const size = this.size;
            let minEnergy = Infinity;
            let voidX = 0, voidY = 0;

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    if (!this.binaryMap[y][x]) {
                        const energy = this.energyMap[y][x];
                        if (energy < minEnergy) {
                            minEnergy = energy;
                            voidX = x;
                            voidY = y;
                        }
                    }
                }
            }

            return { x: voidX, y: voidY, energy: minEnergy };
        }

        findCluster() {
            const size = this.size;
            let maxEnergy = -Infinity;
            let clusterX = 0, clusterY = 0;

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    if (this.binaryMap[y][x]) {
                        const energy = this.energyMap[y][x];
                        if (energy > maxEnergy) {
                            maxEnergy = energy;
                            clusterX = x;
                            clusterY = y;
                        }
                    }
                }
            }

            return { x: clusterX, y: clusterY, energy: maxEnergy };
        }

        findWorstInitialPoint() {
            let maxEnergy = -Infinity;
            let worstX = 0, worstY = 0;

            for (const point of this.initialPoints) {
                if (this.binaryMap[point.y][point.x]) {
                    const energy = this.energyMap[point.y][point.x];
                    if (energy > maxEnergy) {
                        maxEnergy = energy;
                        worstX = point.x;
                        worstY = point.y;
                    }
                }
            }

            return { x: worstX, y: worstY, energy: maxEnergy };
        }

        isMoveBlocked(fromX, fromY, toX, toY) {
            const moveKey = `${fromX},${fromY}->${toX},${toY}`;
            return this.blockedMoves.has(moveKey);
        }

        recordMove(fromX, fromY, toX, toY) {
            const moveKey = `${fromX},${fromY}->${toX},${toY}`;
            const reverseKey = `${toX},${toY}->${fromX},${fromY}`;

            this.moveHistory.push(moveKey);
            this.blockedMoves.add(reverseKey);

            if (this.moveHistory.length > this.maxHistorySize) {
                const oldMove = this.moveHistory.shift();
                this.blockedMoves.delete(oldMove);
            }
        }

        clearMoveHistory() {
            this.moveHistory = [];
            this.blockedMoves.clear();
        }

        saveSnapshot(action) {
            const snapshot = {
                binaryMap: this.binaryMap.map(row => [...row]),
                rankMap: this.rankMap.map(row => [...row]),
                energyMap: this.energyMap.map(row => [...row]),
                phase: this.phase,
                action: action,
                step: this.currentStep
            };
            this.snapshots.push(snapshot);
            this.maxStep = this.snapshots.length - 1;
        }

        generate() {
            const size = this.size;
            const totalPixels = size * size;
            const targetFilled = Math.floor(totalPixels / 2);

            // === PHASE 0: Инициализация 50% белым шумом ===
            let filled = 0;
            let remaining = totalPixels;
            let toFill = targetFilled;

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const probability = toFill / remaining;
                    if (Math.random() < probability) {
                        this.binaryMap[y][x] = true;
                        filled++;
                        toFill--;
                        this.initialPoints.push({x, y});
                    }
                    remaining--;
                }
            }

            while (filled < targetFilled) {
                const emptyCells = [];
                for (let y = 0; y < size; y++) {
                    for (let x = 0; x < size; x++) {
                        if (!this.binaryMap[y][x]) {
                            emptyCells.push({x, y});
                        }
                    }
                }
                if (emptyCells.length > 0) {
                    const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    this.binaryMap[randomCell.y][randomCell.x] = true;
                    this.initialPoints.push({x: randomCell.x, y: randomCell.y});
                    filled++;
                }
            }

            this.updateEnergyMap();
            this.saveSnapshot(`Phase 0: Initial 50% white noise (${filled}/${totalPixels})`);

            // === PHASE 1: Оптимизация начальных 50% ===
            this.phase = 'phase1_optimize';
            let improved = true;
            let iteration = 0;

            while (improved && iteration < 30) {
                improved = false;
                iteration++;

                for (let i = 0; i < targetFilled / 2; i++) {
                    const cluster = this.findCluster();
                    const voidPoint = this.findVoid();

                    if (this.isMoveBlocked(cluster.x, cluster.y, voidPoint.x, voidPoint.y)) {
                        continue;
                    }

                    if (cluster.energy > voidPoint.energy) {
                        this.binaryMap[cluster.y][cluster.x] = false;
                        this.binaryMap[voidPoint.y][voidPoint.x] = true;

                        const idx = this.initialPoints.findIndex(p => p.x === cluster.x && p.y === cluster.y);
                        if (idx >= 0) {
                            this.initialPoints[idx] = {x: voidPoint.x, y: voidPoint.y};
                        }

                        this.recordMove(cluster.x, cluster.y, voidPoint.x, voidPoint.y);
                        this.updateEnergyMap();
                        this.saveSnapshot(`Phase 1: Optimize (${cluster.x},${cluster.y})→(${voidPoint.x},${voidPoint.y})`);
                        improved = true;
                    }
                }
                this.clearMoveHistory();
            }

            // === PHASE 2: Заполнение пустот (ранги 32 → 63) ===
            this.phase = 'phase2_fill';
            let rank = Math.floor(totalPixels / 2);

            while (rank < totalPixels) {
                const voidPoint = this.findVoid();
                console.log (`void energy: ${voidPoint.energy}`);

                // Просто добавляем точку и присваиваем ранг
                this.binaryMap[voidPoint.y][voidPoint.x] = true;
                this.rankMap[voidPoint.y][voidPoint.x] = rank;

                this.updateEnergyMap();
                this.saveSnapshot(`Phase 2: Fill rank ${rank} at (${voidPoint.x}, ${voidPoint.y})`);

                rank++;
                // ❌ УБРАЛИ оптимизацию - она ломала присвоение рангов
            }

            // === PHASE 3: Удаление начальных 50% (ранги 31 → 0) ===
            this.phase = 'phase3_remove';
            rank = Math.floor(totalPixels / 2) - 1;

            while (rank >= 0) {
                const worstPoint = this.findWorstInitialPoint();
                console.log (`cluster energy: ${worstPoint.energy}`);

                // Просто удаляем точку и присваиваем ранг
                this.binaryMap[worstPoint.y][worstPoint.x] = false;
                this.rankMap[worstPoint.y][worstPoint.x] = rank;

                this.updateEnergyMap();
                this.saveSnapshot(`Phase 3: Remove rank ${rank} at (${worstPoint.x}, ${worstPoint.y})`);

                rank--;
                // ❌ УБРАЛИ оптимизацию - она ломала присвоение рангов
            }

            this.phase = 'done';
            this.saveSnapshot('Generation complete! Blue noise texture ready.');

            console.log(`Total steps: ${this.maxStep}`);

            // Проверка: все ли ячейки имеют ранг
            let missingRanks = 0;
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    if (this.rankMap[y][x] === -1) {
                        missingRanks++;
                    }
                }
            }
            console.log(`Missing ranks: ${missingRanks} (должно быть 0)`);
        }

        stepForward() {
            if (this.currentStep < this.maxStep) {
                this.currentStep++;
                this.loadSnapshot(this.currentStep);
                this.render();
                this.updateInfo();
                return true;
            }
            return false;
        }

        stepBackward() {
            if (this.currentStep > 0) {
                this.currentStep--;
                this.loadSnapshot(this.currentStep);
                this.render();
                this.updateInfo();
                return true;
            }
            return false;
        }

        loadSnapshot(index) {
            const snapshot = this.snapshots[index];
            this.binaryMap = snapshot.binaryMap.map(row => [...row]);
            this.rankMap = snapshot.rankMap.map(row => [...row]);
            this.energyMap = snapshot.energyMap.map(row => [...row]);
            this.phase = snapshot.phase;
        }

        restart() {
            this.currentStep = 0;
            this.maxStep = 0;
            this.snapshots = [];
            this.phase = 'init';
            this.initialPoints = [];
            this.moveHistory = [];
            this.blockedMoves.clear();
            this.initMaps();
            this.generate();
            this.render();
            this.updateInfo();
        }

        updateInfo() {
            const snapshot = this.snapshots[this.currentStep];
            const filled = this.binaryMap.flat().filter(v => v).length;
            const total = this.size * this.size;
            const density = (filled / total * 100).toFixed(1);

            const ranksAssigned = this.rankMap.flat().filter(r => r >= 0).length;

            this.infoPanel.innerHTML = `
            <div><strong>Step:</strong> ${this.currentStep} / ${this.maxStep}</div>
            <div><strong>Phase:</strong> ${this.phase}</div>
            <div><strong>Action:</strong> ${snapshot ? snapshot.action : 'N/A'}</div>
            <div><strong>Density:</strong> ${filled}/${total} (${density}%)</div>
            <div><strong>Ranks:</strong> ${ranksAssigned}/${total}</div>
            <div><strong>Sigma:</strong> ${this.sigma}</div>
        `;
        }

        render() {
            this.renderBinaryMap();
            this.renderRankMap();
            this.renderEnergyMap();
            this.renderCurrentPoints();
            this.renderHistogram();
        }

        renderBinaryMap() {
            const canvas = this.canvases.binary;
            const ctx = canvas.getContext('2d');
            const size = this.size;
            const cellSize = this.cellSize;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const px = x * cellSize;
                    const py = y * cellSize;

                    if (this.binaryMap[y][x]) {
                        const isInitial = this.initialPoints.some(p => p.x === x && p.y === y);
                        ctx.fillStyle = isInitial ? '#00ff00' : '#0088ff';
                        ctx.fillRect(px + 2, py + 2, cellSize - 4, cellSize - 4);
                    } else {
                        ctx.fillStyle = '#1a1a1a';
                        ctx.fillRect(px + 2, py + 2, cellSize - 4, cellSize - 4);
                    }

                    ctx.strokeStyle = '#444';
                    ctx.strokeRect(px, py, cellSize, cellSize);
                }
            }
        }

        renderRankMap() {
            const canvas = this.canvases.rank;
            const ctx = canvas.getContext('2d');
            const size = this.size;
            const cellSize = this.cellSize;
            const maxRank = size * size - 1;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const px = x * cellSize;
                    const py = y * cellSize;
                    const rank = this.rankMap[y][x];

                    if (rank >= 0) {
                        const normalized = rank / maxRank;
                        const r = Math.floor(normalized * 255);
                        const b = Math.floor((1 - normalized) * 255);
                        ctx.fillStyle = `rgb(${r}, 100, ${b})`;
                        ctx.fillRect(px + 1, py + 1, cellSize - 2, cellSize - 2);

                        ctx.fillStyle = '#fff';
                        ctx.font = '10px monospace';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(rank.toString(), px + cellSize / 2, py + cellSize / 2);
                    } else {
                        ctx.fillStyle = '#331111';
                        ctx.fillRect(px + 1, py + 1, cellSize - 2, cellSize - 2);
                    }

                    ctx.strokeStyle = '#444';
                    ctx.strokeRect(px, py, cellSize, cellSize);
                }
            }
        }

        renderEnergyMap() {
            const canvas = this.canvases.energy;
            const ctx = canvas.getContext('2d');
            const size = this.size;
            const cellSize = this.cellSize;

            let maxEnergy = 0;
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    maxEnergy = Math.max(maxEnergy, this.energyMap[y][x]);
                }
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const px = x * cellSize;
                    const py = y * cellSize;
                    const energy = this.energyMap[y][x];
                    const normalized = maxEnergy > 0 ? energy / maxEnergy : 0;

                    const intensity = Math.floor(normalized * 200);
                    ctx.fillStyle = `rgb(${intensity}, ${intensity}, ${intensity + 55})`;
                    ctx.fillRect(px + 1, py + 1, cellSize - 2, cellSize - 2);

                    ctx.strokeStyle = '#444';
                    ctx.strokeRect(px, py, cellSize, cellSize);
                }
            }
        }

        renderCurrentPoints() {
            const voidPoint = this.findVoid();
            const clusterPoint = this.findCluster();

            this.renderHighlight(this.canvases.void, voidPoint.x, voidPoint.y, '#ff00ff', 'Void');
            this.renderHighlight(this.canvases.cluster, clusterPoint.x, clusterPoint.y, '#ff0000', 'Cluster');
        }

        renderHighlight(canvas, x, y, color, label) {
            const ctx = canvas.getContext('2d');
            const size = this.size;
            const cellSize = this.cellSize;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const px = x * cellSize;
                    const py = y * cellSize;

                    ctx.fillStyle = this.binaryMap[y][x] ? '#333' : '#1a1a1a';
                    ctx.fillRect(px + 2, py + 2, cellSize - 4, cellSize - 4);
                    ctx.strokeStyle = '#444';
                    ctx.strokeRect(px, py, cellSize, cellSize);
                }
            }

            const px = x * cellSize;
            const py = y * cellSize;
            ctx.fillStyle = color;
            ctx.fillRect(px, py, cellSize, cellSize);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(px, py, cellSize, cellSize);
            ctx.lineWidth = 1;

            ctx.fillStyle = '#fff';
            ctx.font = '10px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(label, px + cellSize/2, py + cellSize - 5);
        }

        renderHistogram() {
            const canvas = this.canvases.histogram;
            const ctx = canvas.getContext('2d');
            const size = this.size;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const histogram = new Array(size * size).fill(0);
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const rank = this.rankMap[y][x];
                    if (rank >= 0) {
                        histogram[rank]++;
                    }
                }
            }

            const maxCount = Math.max(...histogram.filter(v => v > 0), 1);
            const barWidth = canvas.width / (size * size);

            for (let i = 0; i < histogram.length; i++) {
                if (histogram[i] > 0) {
                    const barHeight = (histogram[i] / maxCount) * canvas.height;
                    const hue = (i / (size * size)) * 360;
                    ctx.fillStyle = `hsl(${hue}, 70%, 50%)`;
                    ctx.fillRect(i * barWidth, canvas.height - barHeight, barWidth - 1, barHeight);
                }
            }
        }
    }

    // Инициализация
    const dbg = new VoidAndClusterDebugger(32);
    dbg.generate();
    dbg.render();
</script>
</body>
</html>
